<div class="min-h-screen bg-[#111111] px-6 pb-16 pt-32 text-white sm:px-10 lg:px-16">
  <section class="mx-auto flex max-w-6xl flex-col items-center gap-10">
    <div class="text-center">
      <h1 class="text-3xl font-semibold tracking-tight">Plans</h1>
    </div>

    <div class="grid w-full max-w-5xl gap-6 md:grid-cols-3 md:items-end">
      <article
        *ngFor="let plan of plans"
        class="flex h-full flex-col rounded-[22px] border px-6 pb-6 pt-7 shadow-[0_0_0_1px_rgba(255,255,255,0.02)]"
        [ngClass]="
          plan.featured
            ? 'border-[#7BFA6A] bg-[#151515] md:scale-[1.05]'
            : 'border-[#5821C3] bg-[#121212]'
        "
      >
        <div class="space-y-4">
          <div>
            <h2
              class="font-semibold"
              [ngClass]="plan.featured ? 'text-xl' : 'text-lg'"
            >
              {{ plan.name }}
            </h2>
            <p
              class="mt-2 max-w-[18rem] text-white/70"
              [ngClass]="plan.featured ? 'text-sm' : 'text-xs'"
            >
              {{ plan.description }}
            </p>
          </div>

          <div class="flex items-end gap-1">
            <span class="pb-2 text-base text-white/85">R$</span>
            <span
              class="font-light leading-none"
              [ngClass]="plan.featured ? 'text-5xl' : 'text-4xl'"
            >
              {{ plan.price }}
            </span>
            <span class="pb-2 text-sm text-white/75">/mes</span>
          </div>
        </div>

        <div class="mt-8 flex flex-1 flex-col gap-6">
          <div *ngFor="let group of plan.featureGroups" class="space-y-3">
            <div class="flex items-center gap-3">
              <span
                class="flex h-7 w-7 items-center justify-center rounded-full border text-sm font-semibold"
                [ngClass]="
                  plan.featured
                    ? 'border-[#7BFA6A] text-[#7BFA6A]'
                    : 'border-[#5821C3] text-[#7BFA6A]'
                "
              >
                +
              </span>
              <p
                class="text-white"
                [ngClass]="plan.featured ? 'text-sm font-medium' : 'text-xs font-semibold'"
              >
                {{ group.title }}
              </p>
            </div>

            <ul
              class="list-disc space-y-1 pl-11 text-white/70"
              [ngClass]="plan.featured ? 'text-xs' : 'text-[11px]'"
            >
              <li *ngFor="let item of group.items">
                {{ item }}
              </li>
            </ul>
          </div>
        </div>

        <a
          [routerLink]="'/register'"
          class="mt-8 inline-flex w-fit items-center justify-center rounded-md px-5 py-2 text-sm font-semibold lowercase shadow-sm"
          [ngClass]="
            plan.accent === 'purple'
              ? 'bg-[#5821C3] text-white'
              : 'bg-[#7BFA6A] text-[#212121]'
          "
        >
          {{ plan.buttonLabel }}
        </a>
      </article>
    </div>
  </section>
</div>
